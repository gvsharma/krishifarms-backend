expenses:
  get:
    tags: [Expenses]
    operationId: listExpenses
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/Page'
      - $ref: '../openapi.yaml#/components/parameters/PageSize'
      - $ref: '../openapi.yaml#/components/parameters/Sort'
      - $ref: '../openapi.yaml#/components/parameters/DateFrom'
      - $ref: '../openapi.yaml#/components/parameters/DateTo'
      - name: category_id
        in: query
        schema: { type: string, format: uuid }
      - name: farm_id
        in: query
        schema: { type: string, format: uuid }
      - name: asset_id
        in: query
        schema: { type: string, format: uuid }
      - name: status
        in: query
        schema: { type: string, enum: [draft, posted, reversed] }
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data: { $ref: '../schemas/expenses.yaml#/ExpenseList' }
  post:
    tags: [Expenses]
    operationId: createExpense
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/IdempotencyKey'
    requestBody:
      content:
        application/json:
          schema: { $ref: '../schemas/expenses.yaml#/ExpenseCreate' }
    responses:
      '201': { description: Created }

expenseById:
  get:
    tags: [Expenses]
    operationId: getExpense
    parameters:
      - name: expense_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: OK }
  patch:
    tags: [Expenses]
    operationId: updateExpense
    description: Update draft expense only.
    parameters:
      - name: expense_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Updated }
  delete:
    tags: [Expenses]
    operationId: deleteExpense
    parameters:
      - name: expense_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Soft-deleted }
