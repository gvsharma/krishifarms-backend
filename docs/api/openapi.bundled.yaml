                              type: string
                            score:
                              type: number
                            highlight:
                              type: string
                      total:
                        type: integer
                      page:
                        type: integer
                      page_size:
                        type: integer
                  meta:
                    $ref: '#/components/schemas/Meta'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      description: Sort field. Prefix with `-` for descending (e.g. `-created_at`).
      schema:
        type: string
        example: '-created_at'
    DateFrom:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    SearchQuery:
      name: q
      in: query
      description: Full-text search query (Telugu and English supported).
      schema:
        type: string
        minLength: 1
    FarmerId:
      name: farmer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FarmId:
      name: farm_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: Unique key for idempotent financial POST requests.
      schema:
        type: string
        maxLength: 100
  responses:
    BadRequest:
      description: Validation or business rule error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Invalid request payload
              details:
                field: amount
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Authentication required
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: 'Missing permission: procurements:create'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Resource not found
    Conflict:
      description: Duplicate or conflicting state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Farmer with this code already exists
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Internal server error
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          format: password
    TokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum:
            - bearer
    Meta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
    TokenAPIResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/TokenResponse'
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    MessageData:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    MessageAPIResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/MessageData'
    UUID:
      type: string
      format: uuid
    Money:
      type: number
      format: double
      multipleOf: 0.01
      example: 12500.5
    Farmer:
      type: object
      required:
        - id
        - org_id
        - farmer_code
        - full_name
        - phone_primary
        - village_id
        - status
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        org_id:
          $ref: '#/components/schemas/UUID'
        farmer_code:
          type: string
          maxLength: 50
        full_name:
          type: string
          maxLength: 200
        full_name_te:
          type: string
        father_name:
          type: string
        father_name_te:
          type: string
        phone_primary:
          type: string
          maxLength: 20
        phone_secondary:
          type: string
          maxLength: 20
        village_id:
          $ref: '#/components/schemas/UUID'
        village_name:
          type: string
        address:
          type: string
        address_te:
          type: string
        aadhaar_last4:
          type: string
          maxLength: 4
        status:
          type: string
          enum:
            - active
            - inactive
            - blocked
        notes:
          type: string
        outstanding_amount:
          $ref: '#/components/schemas/Money'
        allOf:
          - $ref: common.yaml#/Timestamps
          - $ref: common.yaml#/SoftDelete
    FarmerList:
      type: object
      required:
        - items
        - total
        - page
        - page_size
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Farmer'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    FarmerListAPIResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/FarmerList'
    FarmerCreate:
      type: object
      required:
        - full_name
        - phone_primary
        - village_id
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 200
        full_name_te:
          type: string
        father_name:
          type: string
        father_name_te:
          type: string
        phone_primary:
          type: string
        phone_secondary:
          type: string
        village_id:
          $ref: '#/components/schemas/UUID'
        address:
          type: string
        address_te:
          type: string
        aadhaar_last4:
          type: string
          maxLength: 4
        notes:
          type: string
    FarmerAPIResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/Farmer'
        meta:
          $ref: '#/components/schemas/Meta'
    FarmerUpdate:
      type: object
      properties:
        full_name:
          type: string
        full_name_te:
          type: string
        phone_primary:
          type: string
        phone_secondary:
          type: string
        village_id:
          $ref: '#/components/schemas/UUID'
        address:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - blocked
        notes:
          type: string
    BankAccount:
      type: object
