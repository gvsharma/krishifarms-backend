openapi: 3.0.3
info:
  title: KrishiFarms CRM API
  version: 1.0.0
  description: |
    REST API for KrishiFarms CRM — farm operations, procurement, workforce, assets, rentals, and finance.

    ## Conventions
    - Base path: `/api/v1`
    - Auth: Bearer JWT (`Authorization: Bearer <access_token>`)
    - Success envelope: `{ "success": true, "data": ..., "meta": { "request_id": "..." } }`
    - Pagination: `page` (default 1), `page_size` (default 20, max 100)
    - Sorting: `sort=field` or `sort=-field` (prefix `-` for descending)
    - Date filters: `date_from`, `date_to` (ISO 8601 date)
    - Search: `q` for full-text; module-specific filters as query params
    - Idempotency: `Idempotency-Key` header on POST for financial mutations
    - Locale: `Accept-Language: en` or `te`
  contact:
    name: KrishiFarms API Support
servers:
  - url: https://api.krishifarms.local/api/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Local development
security:
  - BearerAuth: []
tags:
  - name: Authentication
  - name: Farmers
  - name: Farms
  - name: Procurement
  - name: Payments
  - name: Workers
  - name: Work Orders
  - name: Assets
  - name: Vehicles
  - name: Rentals
  - name: Expenses
  - name: Collections
  - name: Documents
  - name: Search
paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      security: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenAPIResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      security: []
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenAPIResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Revoke refresh token
      security: []
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAPIResponse'
  /farmers:
    get:
      tags:
        - Farmers
      summary: List farmers
      operationId: listFarmers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchQuery'
        - name: village_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
              - blocked
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FarmerListAPIResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Farmers
      summary: Create farmer
      operationId: createFarmer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmerCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FarmerAPIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /farmers/{farmer_id}:
    get:
      tags:
        - Farmers
      summary: Get farmer by ID
      operationId: getFarmer
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FarmerAPIResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Farmers
      summary: Update farmer
      operationId: updateFarmer
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmerUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FarmerAPIResponse'
    delete:
      tags:
        - Farmers
      summary: Soft-delete farmer
      operationId: deleteFarmer
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAPIResponse'
  /farmers/{farmer_id}/bank-accounts:
    get:
      tags:
        - Farmers
      summary: List farmer bank accounts
      operationId: listFarmerBankAccounts
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankAccount'
    post:
      tags:
        - Farmers
      summary: Add bank account
      operationId: createFarmerBankAccount
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account_holder_name
                - bank_name
                - ifsc
                - account_number
              properties:
                account_holder_name:
                  type: string
                bank_name:
                  type: string
                branch:
                  type: string
                ifsc:
                  type: string
                account_number:
                  type: string
                is_primary:
                  type: boolean
      responses:
        '201':
          description: Created
  /farmers/{farmer_id}/bank-accounts/{account_id}:
    patch:
      tags:
        - Farmers
      summary: Update bank account
      operationId: updateFarmerBankAccount
      parameters:
        - $ref: '#/components/parameters/FarmerId'
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Farmers
      summary: Soft-delete bank account
      operationId: deleteFarmerBankAccount
      parameters:
        - $ref: '#/components/parameters/FarmerId'
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /farmers/{farmer_id}/land-parcels:
    get:
      tags:
        - Farmers
      summary: List land parcels
      operationId: listFarmerLandParcels
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          description: OK
    post:
      tags:
        - Farmers
      summary: Add land parcel
      operationId: createFarmerLandParcel
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '201':
          description: Created
  /farmers/{farmer_id}/land-parcels/{parcel_id}:
    patch:
      tags:
        - Farmers
      operationId: updateFarmerLandParcel
      parameters:
        - $ref: '#/components/parameters/FarmerId'
        - name: parcel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Farmers
      operationId: deleteFarmerLandParcel
      parameters:
        - $ref: '#/components/parameters/FarmerId'
        - name: parcel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /farmers/{farmer_id}/crop-history:
    get:
      tags:
        - Farmers
      operationId: listFarmerCropHistory
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          description: OK
    post:
      tags:
        - Farmers
      operationId: createFarmerCropHistory
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '201':
          description: Created
  /farmers/{farmer_id}/ledger:
    get:
      tags:
        - Farmers
      summary: Farmer ledger entries
      operationId: getFarmerLedger
      parameters:
        - $ref: '#/components/parameters/FarmerId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/LedgerEntry'
                      total:
                        type: integer
                      page:
                        type: integer
                      page_size:
                        type: integer
  /farmers/{farmer_id}/outstanding:
    get:
      tags:
        - Farmers
      summary: Current outstanding balance
      operationId: getFarmerOutstanding
      parameters:
        - $ref: '#/components/parameters/FarmerId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Outstanding'
  /farms:
    get:
      tags:
        - Farms
      operationId: listFarms
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchQuery'
        - name: village_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FarmList'
    post:
      tags:
        - Farms
      operationId: createFarm
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmCreate'
      responses:
        '201':
          description: Created
  /farms/{farm_id}:
    get:
      tags:
        - Farms
      operationId: getFarm
      parameters:
        - $ref: '#/components/parameters/FarmId'
      responses:
        '200':
          description: OK
    patch:
      tags:
        - Farms
      operationId: updateFarm
      parameters:
        - $ref: '#/components/parameters/FarmId'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Farms
      operationId: deleteFarm
      parameters:
        - $ref: '#/components/parameters/FarmId'
      responses:
        '200':
          description: Soft-deleted
  /farms/{farm_id}/activities:
    get:
      tags:
        - Farms
      operationId: listFarmActivities
      parameters:
        - $ref: '#/components/parameters/FarmId'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
      responses:
        '200':
          description: OK
    post:
      tags:
        - Farms
      operationId: createFarmActivity
      parameters:
        - $ref: '#/components/parameters/FarmId'
      responses:
        '201':
          description: Created
  /farms/{farm_id}/activities/{activity_id}:
    patch:
      tags:
        - Farms
      operationId: updateFarmActivity
      parameters:
        - $ref: '#/components/parameters/FarmId'
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Farms
      operationId: deleteFarmActivity
      parameters:
        - $ref: '#/components/parameters/FarmId'
        - name: activity_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /procurements:
    get:
      tags:
        - Procurement
      operationId: listProcurements
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - name: farmer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: village_id
          in: query
          schema:
            type: string
            format: uuid
        - name: crop_type_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusDraftConfirmedCancelled'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProcurementList'
    post:
      tags:
        - Procurement
      operationId: createProcurement
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcurementCreate'
      responses:
        '201':
          description: Draft procurement created
  /procurements/{procurement_id}:
    get:
      tags:
        - Procurement
      operationId: getProcurement
      parameters:
        - name: procurement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: procurement_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
    patch:
      tags:
        - Procurement
      operationId: updateProcurement
      description: Update draft procurement only.
      parameters:
        - name: procurement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
  /procurements/{procurement_id}/confirm:
    post:
      tags:
        - Procurement
      operationId: confirmProcurement
      description: Confirm procurement and post farmer ledger entry.
      parameters:
        - name: procurement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Confirmed
        '409':
          $ref: '#/components/responses/Conflict'
  /procurements/{procurement_id}/cancel:
    post:
      tags:
        - Procurement
      operationId: cancelProcurement
      parameters:
        - name: procurement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcurementCancel'
      responses:
        '200':
          description: Cancelled
  /procurements/{procurement_id}/deductions:
    post:
      tags:
        - Procurement
      operationId: addProcurementDeduction
      parameters:
        - name: procurement_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Deduction added
  /farmer-payments:
    get:
      tags:
        - Payments
      operationId: listFarmerPayments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - name: farmer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: payment_type
          in: query
          schema:
            type: string
            enum:
              - advance
              - final
              - adjustment
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PaginatedFarmerPayments'
    post:
      tags:
        - Payments
      operationId: createFarmerPayment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FarmerPaymentCreate'
      responses:
        '201':
          description: Payment recorded
  /farmer-payments/{payment_id}:
    get:
      tags:
        - Payments
      operationId: getFarmerPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: payment_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
  /farmer-payments/{payment_id}/allocate:
    post:
      tags:
        - Payments
      operationId: allocateFarmerPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentAllocation'
      responses:
        '200':
          description: Allocated
  /farmer-payments/{payment_id}/reverse:
    post:
      tags:
        - Payments
      operationId: reverseFarmerPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Reversed
  /payments:
    get:
      tags:
        - Payments
      operationId: listOperationalPayments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
      responses:
        '200':
          description: OK
    post:
      tags:
        - Payments
      operationId: createOperationalPayment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationalPaymentCreate'
      responses:
        '201':
          description: Created
  /payments/{payment_id}:
    get:
      tags:
        - Payments
      operationId: getOperationalPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /workers:
    get:
      tags:
        - Workers
      operationId: listWorkers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SearchQuery'
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/WorkerList'
    post:
      tags:
        - Workers
      operationId: createWorker
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerCreate'
      responses:
        '201':
          description: Created
  /workers/{worker_id}:
    get:
      tags:
        - Workers
      operationId: getWorker
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags:
        - Workers
      operationId: updateWorker
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Workers
      operationId: deleteWorker
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Soft-deleted
  /workers/{worker_id}/skills:
    get:
      tags:
        - Workers
      operationId: listWorkerSkills
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    post:
      tags:
        - Workers
      operationId: createWorkerSkill
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Created
  /workers/{worker_id}/skills/{skill_id}:
    patch:
      tags:
        - Workers
      operationId: updateWorkerSkill
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: skill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Workers
      operationId: deleteWorkerSkill
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: skill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /work-orders:
    get:
      tags:
        - Work Orders
      operationId: listWorkOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - name: worker_id
          in: query
          schema:
            type: string
            format: uuid
        - name: farm_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/WorkOrderStatus'
      responses:
        '200':
          description: OK
    post:
      tags:
        - Work Orders
      operationId: createWorkOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkOrderCreate'
      responses:
        '201':
          description: Created
  /work-orders/{work_order_id}:
    get:
      tags:
        - Work Orders
      operationId: getWorkOrder
      parameters:
        - name: work_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags:
        - Work Orders
      operationId: updateWorkOrder
      parameters:
        - name: work_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated
  /work-orders/{work_order_id}/complete:
    post:
      tags:
        - Work Orders
      operationId: completeWorkOrder
      parameters:
        - name: work_order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkOrderComplete'
      responses:
        '200':
          description: Completed
  /work-orders/{work_order_id}/photos:
