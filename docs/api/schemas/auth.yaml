LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
    password:
      type: string
      minLength: 8
      format: password

RefreshRequest:
  type: object
  required: [refresh_token]
  properties:
    refresh_token:
      type: string

TokenResponse:
  type: object
  required: [access_token, refresh_token, token_type]
  properties:
    access_token:
      type: string
    refresh_token:
      type: string
    token_type:
      type: string
      enum: [bearer]

TokenAPIResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: '#/TokenResponse'
    meta:
      $ref: 'common.yaml#/Meta'

MessageAPIResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: 'common.yaml#/MessageData'
