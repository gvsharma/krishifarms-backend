ErrorResponse:
  type: object
  required: [success, error]
  properties:
    success:
      type: boolean
      enum: [false]
    error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: object
          additionalProperties: true

MessageData:
  type: object
  required: [message]
  properties:
    message:
      type: string

Meta:
  type: object
  properties:
    request_id:
      type: string
      format: uuid

PaginationMeta:
  type: object
  required: [total, page, page_size]
  properties:
    total:
      type: integer
      minimum: 0
    page:
      type: integer
      minimum: 1
    page_size:
      type: integer
      minimum: 1
      maximum: 100

Timestamps:
  type: object
  properties:
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

SoftDelete:
  type: object
  properties:
    deleted_at:
      type: string
      format: date-time
      nullable: true

UUID:
  type: string
  format: uuid

Money:
  type: number
  format: double
  multipleOf: 0.01
  example: 12500.50

Weight:
  type: number
  format: double
  multipleOf: 0.001
  example: 452.500

LocaleField:
  type: object
  description: Bilingual field pattern used across entities.
  properties:
    name:
      type: string
    name_te:
      type: string
      description: Telugu display name

StatusDraftConfirmedCancelled:
  type: string
  enum: [draft, confirmed, cancelled]

PaymentStatus:
  type: string
  enum: [pending, completed, failed, reversed]

WorkOrderStatus:
  type: string
  enum: [open, in_progress, completed, cancelled]

DocumentType:
  type: string
  description: |
    Primary operational types: fuel_bill, crop_bill, rental_bill, vendor_bill,
    payment_receipt, upi_screenshot, photo. Extension types reserved for imports and media.
  enum:
    - fuel_bill
    - crop_bill
    - rental_bill
    - weighment_slip
    - vendor_bill
    - upi_screenshot
    - payment_receipt
    - voice_note
    - whatsapp_export
    - photo
    - pdf
